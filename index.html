<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fund the Future: AI × Sustainability</title>
<script src="https://unpkg.com/mqtt@5.10.4/dist/mqtt.min.js" async></script>
<style>
  :root {
    --bg: #09090B; --bg1: #0F0F11; --bg2: #18181B; --bg3: #1F1F23;
    --border: rgba(255,255,255,0.08); --border-h: rgba(255,255,255,0.14);
    --text: #FAFAFA; --muted: #A1A1AA; --dim: #52525B;
    --accent: #10B981; --accent-m: rgba(16,185,129,0.12); --accent-b: rgba(16,185,129,0.25);
    --gold: #F59E0B; --silver: #9CA3AF; --bronze: #D97706;
    --danger: #EF4444; --danger-m: rgba(239,68,68,0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
  input::placeholder { color: var(--dim); }
  button { font-family: inherit; }
  button:active { transform: scale(0.97) !important; }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

  .view { display: none; } .view.active { display: block; }
  .center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 85vh; padding: 24px; text-align: center; }

  .logo { display: inline-block; }
  .logo svg { display: block; }

  .btn { padding: 10px 20px; font-size: 13px; font-weight: 600; background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn:hover { border-color: var(--border-h); color: var(--text); }
  .btn.accent { background: var(--accent-m); color: var(--accent); border-color: var(--accent-b); }
  .btn.accent:hover { background: rgba(16,185,129,0.2); }
  .btn.danger { background: var(--danger-m); color: var(--danger); border-color: rgba(239,68,68,0.2); }
  .btn.primary { background: var(--accent); color: var(--bg); border: none; font-weight: 700; }
  .btn.primary:disabled { background: rgba(255,255,255,0.04); color: var(--dim); cursor: not-allowed; }
  .btn.large { padding: 14px 36px; font-size: 15px; }

  .field { width: 100%; padding: 14px 16px; font-size: 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); outline: none; font-family: inherit; }
  .field:focus { border-color: var(--accent-b); }
  .field.sm { padding: 12px 16px; font-size: 14px; }
  .field.mono { font-family: 'SF Mono','Fira Code','JetBrains Mono',monospace; font-size: 13px; padding: 10px 14px; }

  .card { background: var(--bg1); border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; }
  .stat-label { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; display: block; margin-bottom: 2px; }
  .stat-value { font-size: 26px; font-weight: 800; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }

  .pill { background: var(--accent-m); border: 1px solid var(--accent-b); border-radius: 8px; padding: 6px 14px; font-size: 13px; color: var(--accent); font-weight: 500; display: inline-block; }

  .cat-card { background: var(--bg1); border: 1px solid var(--border); border-radius: 12px; padding: 14px; position: relative; overflow: hidden; transition: border-color 0.2s; margin-bottom: 8px; }
  .cat-card.active { border-color: rgba(255,255,255,0.15); }
  .cat-bar { position: absolute; bottom: 0; left: 0; height: 2px; transition: width 0.35s cubic-bezier(0.4,0,0.2,1); }
  .cat-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
  .cat-icon { font-size: 20px; line-height: 1; margin-top: 1px; }
  .cat-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 1px; }
  .cat-desc { font-size: 11px; color: var(--dim); line-height: 1.4; }
  .cat-controls { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .cat-btn { width: 40px; height: 40px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg2); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s; }
  .cat-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .cat-btn.plus { border-color: rgba(255,255,255,0.15); }
  .cat-amount { flex: 1; text-align: center; font-size: 19px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; transition: color 0.2s; }

  .reveal-btn { padding: 14px 40px; font-size: 15px; font-weight: 700; letter-spacing: -0.02em; background: var(--accent); color: var(--bg); border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
  .reveal-btn:disabled { background: repeating-linear-gradient(135deg, var(--bg2), var(--bg2) 4px, var(--bg3) 4px, var(--bg3) 8px); color: var(--dim); border: 1px solid var(--border); cursor: not-allowed; }

  .anim-bar-track { height: 32px; background: var(--bg2); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .anim-bar-fill { height: 100%; border-radius: 7px; width: 0%; transition: width 1.2s cubic-bezier(0.34,1.56,0.64,1); display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; }
  .anim-bar-fill span { font-size: 11px; font-weight: 700; opacity: 0.8; }
  .rank-badge { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; flex-shrink: 0; }

  .modal-bg { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: flex; align-items: flex-start; justify-content: center; padding: 40px 20px; overflow-y: auto; }
  .modal { background: var(--bg1); border-radius: 16px; padding: 24px; width: 100%; max-width: 440px; border: 1px solid var(--border); }

  .confetti-piece { position: absolute; top: -20px; border-radius: 1px; animation: confFall var(--dur) ease-in var(--delay) forwards; }
  @keyframes confFall { 0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) translateX(var(--drift)) rotate(720deg);opacity:0} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-7px)} }

  .connection-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .connection-dot.connected { background: var(--accent); animation: pulse 2s ease-in-out infinite; }
  .connection-dot.disconnected { background: var(--danger); }

  @media (max-width: 767px) {
    .desktop-only { display: none !important; }
  }
</style>
</head>
<body>

<!-- ═══════════════ ROLE SELECT ═══════════════ -->
<div id="view-role" class="view active">
  <div class="center">
    <div class="logo" id="logo-role"></div>
    <h1 style="font-size:30px;font-weight:800;letter-spacing:-0.05em;margin-top:16px;margin-bottom:4px">Fund the Future</h1>
    <p style="color:var(--dim);font-size:14px;margin-bottom:4px">AI × Sustainability</p>
    <p style="color:var(--dim);font-size:14px;margin-bottom:36px">Where would you invest 100k?</p>
    <div style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px">
      <button class="btn primary large" onclick="selectRole('participant')">I'm a Participant</button>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="text" id="inp-session" class="field sm" placeholder="Session code (from presenter)" maxlength="10" style="flex:1;font-family:monospace;text-align:center;letter-spacing:0.1em">
        <button class="btn accent" onclick="joinWithCode()" style="padding:12px 16px">Join</button>
      </div>
      <div style="text-align:center;color:var(--dim);font-size:12px;margin:8px 0">or</div>
      <button class="btn large" onclick="selectRole('presenter')">Presenter / Moderator</button>
    </div>
  </div>
</div>

<!-- ═══════════════ NAME ENTRY ═══════════════ -->
<div id="view-name" class="view">
  <div class="center">
    <div class="logo" id="logo-name"></div>
    <h1 style="font-size:26px;font-weight:800;letter-spacing:-0.04em;margin-top:16px;margin-bottom:4px">Fund the Future</h1>
    <p style="color:var(--dim);font-size:13px;margin-bottom:4px">AI × Sustainability</p>
    <p style="color:var(--muted);font-size:14px;line-height:1.7;max-width:300px;margin-bottom:8px">
      You have <span style="color:var(--accent);font-weight:700">€100,000</span> to invest. Where do you see the biggest lever?
    </p>
    <div style="width:100%;max-width:380px;display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      <input type="text" id="inp-name" class="field" placeholder="Your first name" maxlength="20">
      <input type="text" id="inp-company" class="field sm" placeholder="Company (optional)" maxlength="40">
    </div>
    <button class="btn primary large" id="btn-go" disabled onclick="startAllocation()" style="width:100%;max-width:380px">Continue</button>
  </div>
</div>

<!-- ═══════════════ ALLOCATION ═══════════════ -->
<div id="view-alloc" class="view">
  <div style="max-width:460px;margin:0 auto;padding:10px 16px 106px">
    <div id="alloc-header" style="position:sticky;top:0;z-index:20;padding-bottom:12px;padding-top:8px"></div>
    <div id="alloc-cards"></div>
    <div style="position:fixed;bottom:0;left:0;right:0;padding:8px 16px 18px;z-index:30;background:linear-gradient(0deg,var(--bg) 70%,transparent)">
      <button class="btn primary large" id="btn-submit" disabled onclick="submitAllocation()" style="width:100%;max-width:460px;margin:0 auto;display:block">Allocate the full €100,000</button>
    </div>
  </div>
</div>

<!-- ═══════════════ WAITING ═══════════════ -->
<div id="view-wait" class="view">
  <div class="center">
    <div id="wait-content"></div>
  </div>
</div>

<!-- ═══════════════ PRESENTER ═══════════════ -->
<div id="view-presenter" class="view">
  <div style="min-height:100vh;padding:32px 44px 56px;max-width:1140px;margin:0 auto" id="presenter-root"></div>
</div>

<!-- ═══════════════ CONFETTI CONTAINER ═══════════════ -->
<div id="confetti-box" style="position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;display:none"></div>

<script>
// ╔═══════════════════════════════════════════════════════════════╗
// ║  CONFIG                                                       ║
// ╚═══════════════════════════════════════════════════════════════╝
const CATEGORIES = [
  { id:"dq", icon:"🔄", name:"Data Quality & Integration", desc:"Clean up legacy systems (SAP etc.), break down data silos", color:"#F87171" },
  { id:"ca", icon:"💬", name:"Conversational Analytics", desc:"Natural language access to data, self-service BI", color:"#34D399" },
  { id:"mb", icon:"📊", name:"Market Data & Benchmarking", desc:"Automated extraction of external data for comparisons", color:"#60A5FA" },
  { id:"ai", icon:"🏗️", name:"AI-Ready Data Architecture", desc:"Modern data platform (Lakehouse, Medallion, Fabric)", color:"#A78BFA" },
  { id:"esg", icon:"🌱", name:"Sustainability & ESG Reporting", desc:"Carbon footprint, ESRS KPIs, sustainability reports", color:"#FBBF24" },
  { id:"agent", icon:"🤖", name:"Agent-Based Automation", desc:"AI agents for workflows, MCP servers, data pipelines", color:"#F472B6" },
];
const BUDGET = 100000, STEP = 10000;
const TIMERS = [{l:"1 min",s:60},{l:"2 min",s:120},{l:"3 min",s:180},{l:"5 min",s:300}];
const fmt = v => "€" + v.toLocaleString("en-US");
const BROKER = "wss://broker.hivemq.com:8884/mqtt";

// ╔═══════════════════════════════════════════════════════════════╗
// ║  STATE                                                        ║
// ╚═══════════════════════════════════════════════════════════════╝
let role = null, playerName = "", playerCompany = "", playerId = "";
let alloc = {};
let sessionId = "";
let mqttClient = null;
let participants = {};
let phase = "voting";
let timer = null, timerActive = false, timerInterval = null;
let baseUrl = ""; // Configurable base URL for QR code

CATEGORIES.forEach(c => alloc[c.id] = 0);

// ╔═══════════════════════════════════════════════════════════════╗
// ║  SVG LOGO                                                     ║
// ╚═══════════════════════════════════════════════════════════════╝
const LOGO_SVG = `<svg width="44" height="44" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="15" stroke="#10B981" stroke-width="1.5" opacity="0.3"/><path d="M16 6L20 14L16 12L12 14Z" fill="#10B981" opacity="0.6"/><path d="M10 16C10 22 16 26 16 26C16 26 22 22 22 16C22 12 19 10 16 10C13 10 10 12 10 16Z" fill="#10B981"/><path d="M15 15L16 21L17 15Z" fill="#09090B" opacity="0.5"/></svg>`;
document.querySelectorAll('.logo').forEach(el => el.innerHTML = LOGO_SVG);

// ╔═══════════════════════════════════════════════════════════════╗
// ║  QR CODE ENCODER                                              ║
// ╚═══════════════════════════════════════════════════════════════╝
const QR = (() => {
  const EXP=new Uint8Array(512),LOG=new Uint8Array(256);let x=1;
  for(let i=0;i<255;i++){EXP[i]=x;LOG[x]=i;x=(x<<1)^(x&128?0x11d:0);}
  for(let i=255;i<512;i++)EXP[i]=EXP[i-255];LOG[0]=255;
  const gfM=(a,b)=>(a===0||b===0)?0:EXP[LOG[a]+LOG[b]];
  function rsG(n){let g=[1];for(let i=0;i<n;i++){const ng=new Array(g.length+1).fill(0);for(let j=0;j<g.length;j++){ng[j]^=g[j];ng[j+1]^=gfM(g[j],EXP[i]);}g=ng;}return g;}
  function rsE(d,n){const g=rsG(n),r=new Uint8Array(d.length+n);r.set(d);for(let i=0;i<d.length;i++){const c=r[i];if(c!==0)for(let j=0;j<g.length;j++)r[i+j]^=gfM(g[j],c);}return r.slice(d.length);}
  const V=[null,{d:19,e:7,b:[1,19]},{d:34,e:10,b:[1,34]},{d:55,e:15,b:[1,55]},{d:80,e:20,b:[1,80]},{d:108,e:26,b:[1,108]},{d:136,e:36,b:[2,68]},{d:156,e:40,b:[2,78]},{d:194,e:48,b:[2,97]},{d:232,e:56,b:[2,116]},{d:274,e:68,b:[2,68,2,69]}];
  const AP=[null,[],[6,18],[6,22],[6,26],[6,30],[6,34],[6,22,38],[6,24,42],[6,26,46],[6,28,50]];
  function sV(l){for(let v=1;v<=10;v++){const c=v<=9?8:16;if(4+c+l*8<=V[v].d*8)return v;}return 10;}
  function eD(t,ver){const vi=V[ver],cc=ver<=9?8:16,by=new TextEncoder().encode(t);let b="0100";b+=by.length.toString(2).padStart(cc,"0");for(const x of by)b+=x.toString(2).padStart(8,"0");b+="0".repeat(Math.min(4,vi.d*8-b.length));while(b.length%8)b+="0";const pd=[0xec,0x11];let pi=0;while(b.length<vi.d*8){b+=pd[pi%2].toString(2).padStart(8,"0");pi++;}const d=new Uint8Array(vi.d);for(let i=0;i<vi.d;i++)d[i]=parseInt(b.substr(i*8,8),2);const ep=vi.e/(vi.b.length/2),bl=[],ec=[];let di=0;for(let i=0;i<vi.b.length;i+=2){const cnt=vi.b[i],sz=vi.b[i+1];for(let j=0;j<cnt;j++){const bk=d.slice(di,di+sz);bl.push(bk);ec.push(rsE(bk,ep));di+=sz;}}const r=[];const mx=Math.max(...bl.map(b=>b.length));for(let i=0;i<mx;i++)for(const b of bl)if(i<b.length)r.push(b[i]);for(let i=0;i<ep;i++)for(const b of ec)if(i<b.length)r.push(b[i]);return new Uint8Array(r);}
  function cM(ver){const sz=ver*4+17,m=Array.from({length:sz},()=>new Int8Array(sz)),rv=Array.from({length:sz},()=>new Uint8Array(sz));const set=(r,c,v)=>{if(r>=0&&r<sz&&c>=0&&c<sz){m[r][c]=v?1:-1;rv[r][c]=1;}};function pf(row,col){for(let r=-1;r<=7;r++)for(let c=-1;c<=7;c++){const io=r>=0&&r<=6&&c>=0&&c<=6,ii=r>=2&&r<=4&&c>=2&&c<=4,ob=r===0||r===6||c===0||c===6;set(row+r,col+c,ii||(io&&ob));}}pf(0,0);pf(0,sz-7);pf(sz-7,0);for(let i=8;i<sz-8;i++){set(6,i,i%2===0);set(i,6,i%2===0);}const al=AP[ver];if(al.length>0)for(const r of al)for(const c of al){if(rv[r]?.[c])continue;for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++)set(r+dr,c+dc,Math.abs(dr)===2||Math.abs(dc)===2||(dr===0&&dc===0));}set(sz-8,8,true);for(let i=0;i<8;i++){if(!rv[8][i]){rv[8][i]=1;m[8][i]=0;}if(!rv[8][sz-1-i]){rv[8][sz-1-i]=1;m[8][sz-1-i]=0;}if(!rv[i][8]){rv[i][8]=1;m[i][8]=0;}if(!rv[sz-1-i][8]){rv[sz-1-i][8]=1;m[sz-1-i][8]=0;}}if(!rv[8][8]){rv[8][8]=1;m[8][8]=0;}return{m,rv,sz};}
  function pD(m,rv,sz,d){let bi=0;const tb=d.length*8;let col=sz-1;while(col>=0){if(col===6)col--;for(let row=0;row<sz;row++)for(let c=0;c<2;c++){const cc=col-c,up=((sz-1-col+(col>6?1:0))/2|0)%2===0,rr=up?sz-1-row:row;if(cc>=0&&!rv[rr][cc]){if(bi<tb){m[rr][cc]=((d[bi>>3]>>(7-(bi&7)))&1)?1:-1;bi++;}else m[rr][cc]=-1;}}col-=2;}}
  const MK=[(r,c)=>(r+c)%2===0,r=>r%2===0,(_,c)=>c%3===0,(r,c)=>(r+c)%3===0,(r,c)=>(~~(r/2)+~~(c/3))%2===0,(r,c)=>(r*c)%2+(r*c)%3===0,(r,c)=>((r*c)%2+(r*c)%3)%2===0,(r,c)=>((r+c)%2+(r*c)%3)%2===0];
  function aM(m,rv,sz,mi){const o=m.map(r=>Int8Array.from(r));for(let r=0;r<sz;r++)for(let c=0;c<sz;c++)if(!rv[r][c]&&MK[mi](r,c))o[r][c]=o[r][c]===1?-1:1;return o;}
  const FB=[0x77c4,0x72f3,0x7daa,0x789d,0x662f,0x6318,0x6c41,0x6976];
  function wF(m,sz,mi){const b=FB[mi],p=[];for(let i=0;i<=5;i++)p.push([8,i]);p.push([8,7],[8,8],[7,8]);for(let i=5;i>=0;i--)p.push([i,8]);for(let i=0;i<15;i++){const v=(b>>(14-i))&1;m[p[i][0]][p[i][1]]=v?1:-1;}for(let i=0;i<7;i++)m[sz-1-i][8]=((b>>(14-i))&1)?1:-1;for(let i=7;i<15;i++)m[8][sz-15+i]=((b>>(14-i))&1)?1:-1;}
  function sc(m,sz){let s=0;for(let r=0;r<sz;r++){let run=1;for(let c=1;c<sz;c++){if(m[r][c]===m[r][c-1])run++;else{if(run>=5)s+=run-2;run=1;}}if(run>=5)s+=run-2;}for(let c=0;c<sz;c++){let run=1;for(let r=1;r<sz;r++){if(m[r][c]===m[r-1][c])run++;else{if(run>=5)s+=run-2;run=1;}}if(run>=5)s+=run-2;}return s;}
  function generate(txt){const ver=sV(new TextEncoder().encode(txt).length),cw=eD(txt,ver),{m,rv,sz}=cM(ver);pD(m,rv,sz,cw);let bs=Infinity,bm=null;for(let i=0;i<8;i++){const mk=aM(m,rv,sz,i);wF(mk,sz,i);const s=sc(mk,sz);if(s<bs){bs=s;bm=mk;}}return{matrix:bm,size:sz};}
  return{generate};
})();

function makeQR(text, size=180) {
  try {
    const {matrix:m, size:qs} = QR.generate(text);
    const cs = size / (qs + 8);
    let rects = '';
    for (let r=0; r<qs; r++) for (let c=0; c<qs; c++) if (m[r][c]===1) rects += `<rect x="${(c+4)*cs}" y="${(r+4)*cs}" width="${cs+.5}" height="${cs+.5}" fill="#09090B"/>`;
    return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}" width="${size}" height="${size}"><rect width="${size}" height="${size}" fill="#fff" rx="12"/>${rects}</svg>`;
  } catch { return '<div style="width:180px;height:180px;background:var(--bg2);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px">QR Error</div>'; }
}

// ╔═══════════════════════════════════════════════════════════════╗
// ║  MQTT CONNECTION                                              ║
// ╚═══════════════════════════════════════════════════════════════╝
function connectMQTT(onConnect) {
  if (typeof mqtt === 'undefined') {
    console.warn('MQTT library not loaded yet, retrying in 1s...');
    setTimeout(() => connectMQTT(onConnect), 1000);
    return;
  }
  try {
    const clientId = 'ftf_' + Math.random().toString(36).substr(2, 8);
    mqttClient = mqtt.connect(BROKER, {
      clientId, clean: true, connectTimeout: 8000, reconnectPeriod: 3000,
    });
    mqttClient.on('connect', () => { console.log('MQTT connected'); onConnect?.(); renderPresenter?.(); });
    mqttClient.on('error', e => console.error('MQTT error:', e));
    mqttClient.on('offline', () => { console.warn('MQTT offline'); });
  } catch(e) {
    console.error('MQTT connect failed:', e);
  }
}

function publish(subtopic, data, retain = false) {
  try {
    if (mqttClient?.connected) {
      mqttClient.publish(`ftf/${sessionId}/${subtopic}`, JSON.stringify(data), { qos: 1, retain });
    }
  } catch(e) { console.error('Publish error:', e); }
}

function subscribe(subtopic, handler) {
  if (!mqttClient) return;
  const topic = `ftf/${sessionId}/${subtopic}`;
  mqttClient.subscribe(topic, { qos: 1 });
  mqttClient.on('message', (t, msg) => {
    if (t.startsWith(topic.replace('#', ''))) {
      try { handler(JSON.parse(msg.toString()), t); } catch {}
    }
  });
}

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
}

// ║  ROLE SELECTION                                               ║
// ╚═══════════════════════════════════════════════════════════════╝
function joinWithCode() {
  const code = document.getElementById('inp-session')?.value?.trim();
  if (!code) { document.getElementById('inp-session')?.focus(); return; }
  sessionId = code;
  role = 'participant';
  showView('name');
  document.getElementById('inp-name').focus();
}

function selectRole(r) {
  role = r;
  if (r === 'participant') {
    const params = new URLSearchParams(window.location.search);
    sessionId = params.get('s') || document.getElementById('inp-session')?.value?.trim() || '';
    if (!sessionId) {
      // No session? Focus the session code input
      document.getElementById('inp-session')?.focus();
      return;
    }
    showView('name');
    document.getElementById('inp-name').focus();
  } else {
    sessionId = Math.random().toString(36).substr(2, 6);
    initPresenter();
  }
}

// Auto-detect from URL: if ?s= is present, go straight to participant mode
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('s')) {
    sessionId = params.get('s');
    role = 'participant';
    showView('name');
    setTimeout(() => document.getElementById('inp-name')?.focus(), 100);
  }
})();

// Name entry validation
document.getElementById('inp-name').addEventListener('input', () => {
  document.getElementById('btn-go').disabled = !document.getElementById('inp-name').value.trim();
});
document.getElementById('inp-name').addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('inp-name').value.trim()) startAllocation();
});

// ║  PARTICIPANT: ALLOCATION                                      ║
// ╚═══════════════════════════════════════════════════════════════╝
function startAllocation() {
  playerName = document.getElementById('inp-name').value.trim();
  playerCompany = document.getElementById('inp-company').value.trim();
  playerId = playerName.toLowerCase().replace(/[^a-z0-9]/g,'') + '_' + Date.now().toString(36);
  CATEGORIES.forEach(c => alloc[c.id] = 0);
  renderAllocation();
  showView('alloc');

  // Disconnect old MQTT if any (important for repeat participation)
  if (mqttClient) { try { mqttClient.end(true); } catch {} mqttClient = null; }
  // Connect fresh MQTT (for submission), but do NOT subscribe to phase yet
  connectMQTT();
}

function renderAllocation() {
  const total = Object.values(alloc).reduce((a,b) => a+b, 0);
  const rem = BUDGET - total;
  const label = playerCompany ? `${playerName} (${playerCompany})` : playerName;

  // Header
  document.getElementById('alloc-header').innerHTML = `
    <div style="text-align:center;margin-bottom:5px"><span style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.12em;font-weight:500">Remaining Budget</span></div>
    <div style="font-size:32px;font-weight:800;text-align:center;font-variant-numeric:tabular-nums;letter-spacing:-0.03em;color:${rem===0?'var(--accent)':rem<30000?'var(--gold)':'var(--text)'};transition:color 0.2s">${fmt(rem)}</div>
    <div style="height:3px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden"><div style="height:100%;border-radius:2px;width:${(total/BUDGET)*100}%;background:${rem===0?'var(--accent)':'rgba(255,255,255,0.25)'};transition:width 0.35s cubic-bezier(0.4,0,0.2,1)"></div></div>
    <div style="text-align:center;margin-top:5px;font-size:11px;color:var(--dim)">${label} · ${fmt(total)} of ${fmt(BUDGET)}</div>
  `;
  document.getElementById('alloc-header').style.background = `linear-gradient(180deg, var(--bg) 78%, transparent)`;

  // Cards
  let html = '';
  CATEGORIES.forEach(cat => {
    const v = alloc[cat.id];
    const pct = Math.round((v / BUDGET) * 100);
    html += `
      <div class="cat-card ${v > 0 ? 'active' : ''}" style="${v > 0 ? 'border-color:'+cat.color+'30' : ''}">
        <div class="cat-bar" style="width:${pct}%;background:${cat.color}"></div>
        <div class="cat-top">
          <span class="cat-icon">${cat.icon}</span>
          <div style="flex:1;min-width:0"><div class="cat-name">${cat.name}</div><div class="cat-desc">${cat.desc}</div></div>
        </div>
        <div class="cat-controls">
          <button class="cat-btn" onclick="changeAlloc('${cat.id}',-1)" ${v<=0?'disabled':''}>&minus;</button>
          <div class="cat-amount" style="color:${v > 0 ? cat.color : 'var(--dim)'}">${fmt(v)}${v > 0 ? '<div style="font-size:10px;color:var(--dim);font-weight:400;margin-top:1px">'+pct+'%</div>' : ''}</div>
          <button class="cat-btn plus" onclick="changeAlloc('${cat.id}',1)" ${rem<=0&&v===0?'disabled':''} style="${v>=0?'border-color:'+cat.color+'30;background:'+cat.color+'10;color:'+cat.color:''}">+</button>
        </div>
      </div>`;
  });
  document.getElementById('alloc-cards').innerHTML = html;

  // Submit button
  const btn = document.getElementById('btn-submit');
  btn.disabled = !rem === 0 ? true : rem !== 0;
  btn.textContent = rem === 0 ? 'Submit allocation' : 'Allocate the full ' + fmt(BUDGET);
}

function changeAlloc(id, dir) {
  const newVal = alloc[id] + dir * STEP;
  if (newVal < 0) return;
  const newTotal = Object.values({...alloc, [id]: newVal}).reduce((a,b) => a+b, 0);
  if (newTotal > BUDGET) return;
  alloc[id] = newVal;
  renderAllocation();
}

function submitAllocation() {
  const total = Object.values(alloc).reduce((a,b) => a+b, 0);
  if (total !== BUDGET) return;
  const submitTime = Date.now();
  publish('votes/' + playerId, { name: playerName, company: playerCompany, allocations: alloc, ts: submitTime }, true);
  fireConfetti();
  setTimeout(() => {
    showWaiting(false);
    // Subscribe to phase changes ONLY now (after submission)
    // Timestamp guard: ignore any phase message older than our submission
    subscribe('phase', data => {
      if (data.phase === 'revealed' && data.ts > submitTime) {
        showWaiting(true);
      }
    });
  }, 2000);
}

function showWaiting(revealed) {
  showView('wait');
  const el = document.getElementById('wait-content');
  if (revealed) {
    el.innerHTML = `
      <div style="width:56px;height:56px;border-radius:16px;background:var(--accent-m);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px">✓</div>
      <h2 style="font-size:22px;font-weight:700;margin-bottom:6px">Results are in</h2>
      <p style="color:var(--muted);font-size:14px">Check the presenter screen for the full breakdown.</p>
      <div style="margin-top:24px;padding:18px;background:var(--bg1);border-radius:12px;border:1px solid var(--border);width:100%;max-width:340px;text-align:left">
        <div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-bottom:12px">Your allocation</div>
        ${CATEGORIES.filter(c=>alloc[c.id]>0).sort((a,b)=>alloc[b.id]-alloc[a.id]).map(c=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted);font-size:13px">${c.icon} ${c.name}</span><span style="color:${c.color};font-weight:600;font-size:13px">${fmt(alloc[c.id])}</span></div>`).join('')}
      </div>`;
  } else {
    el.innerHTML = `
      <div style="animation:float 3s ease-in-out infinite;margin-bottom:12px"><div style="width:56px;height:56px;border-radius:16px;background:var(--accent-m);display:flex;align-items:center;justify-content:center;margin:0 auto">${LOGO_SVG.replace('44','28').replace('44','28')}</div></div>
      <h2 style="font-size:20px;font-weight:700;margin-bottom:4px">Submitted</h2>
      <p style="color:var(--muted);font-size:14px">Thanks, ${playerName}. Waiting for the reveal...</p>
      <div style="margin-top:18px;display:flex;gap:5px;justify-content:center">${[0,1,2].map(i=>`<div style="width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bounce 1.4s ease-in-out ${i*0.16}s infinite"></div>`).join('')}</div>`;
    // Listen for reveal
  }
}

function initPresenter() {
  phase = 'voting';
  participants = {};
  showView('presenter');

  connectMQTT(() => {
    subscribe('votes/#', (data, topic) => {
      const pid = topic.split('/').pop();
      participants[pid] = data;
      renderPresenter();
    });
  });

  renderPresenter();
}

    } else {

          <div style="display:flex;align-items:center;gap:10px">
            ${r?`<span class="rank-badge" style="background:${r===1?'var(--gold)':r===2?'var(--silver)':r===3?'var(--bronze)':'rgba(255,255,255,0.06)'};color:${r<=3?'var(--bg)':'var(--dim)'}">${r}</span>`:''}
            <span style="font-size:22px">${cat.icon}</span>
            <span style="font-size:14px;font-weight:600">${cat.name}</span>
          </div>
          <span style="font-size:20px;font-weight:700;color:${cat.color};font-variant-numeric:tabular-nums;opacity:${show?1:0};transition:opacity 0.6s ease ${i*0.35}s;min-width:90px;text-align:right;letter-spacing:-0.02em" id="bar-val-${cat.id}">${fmt(cat.avg)}</span>

      <h3 style="color:var(--muted);font-size:16px;font-weight:600;margin-top:14px;margin-bottom:6px">No participants yet</h3>
      <p style="color:var(--dim);font-size:13px">Share the QR code or use Manual Entry.</p>
    </div>`;
  }

  document.getElementById('presenter-root').innerHTML = html;

    requestAnimationFrame(() => {
      sorted.forEach((cat, i) => {
        const pct = maxA > 0 ? (cat.avg / maxA) * 100 : 0;
        setTimeout(() => {
          const fill = document.getElementById('bar-fill-' + cat.id);
          if (fill) fill.style.width = Math.max(pct, 1.5) + '%';
        }, 50);
      });
    });
  }
}

function updateBaseUrl(url) {
  url = url.trim().replace(/\/+$/, ''); // remove trailing slashes
  baseUrl = url;
  renderPresenter();
}

function toggleTimerMenu() {
  const dd = document.getElementById('timer-dropdown');
  dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
}

function startTimer(seconds) {
  timer = seconds; timerActive = true;
  document.getElementById('timer-dropdown').style.display = 'none';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (timer > 0) { timer--; renderPresenter(); }
    else { timerActive = false; clearInterval(timerInterval); renderPresenter(); }
  }, 1000);
  renderPresenter();
}

function stopTimer() {
  timerActive = false; clearInterval(timerInterval); renderPresenter();
}

function revealResults() {
  phase = 'revealed';
  publish('phase', { phase: 'revealed', ts: Date.now() });
  renderPresenter();
}

function resetGame() {
  if (!confirm('Delete all data and start a new session?')) return;
  participants = {}; phase = 'voting'; timer = null; timerActive = false;
  clearInterval(timerInterval);
  // New session ID
  if (mqttClient) { try { mqttClient.end(); } catch {} }
  sessionId = Math.random().toString(36).substr(2, 6);
  connectMQTT(() => {
    subscribe('votes/#', (data, topic) => {
      const pid = topic.split('/').pop();
      participants[pid] = data;
      renderPresenter();
    });
  });
  renderPresenter();
}

function showManualEntry() {
  const allocs = {}; CATEGORIES.forEach(c => allocs[c.id] = 0);
  const modal = document.createElement('div');
  modal.className = 'modal-bg';
  modal.id = 'manual-modal';
  const render = () => {
    const total = Object.values(allocs).reduce((a,b)=>a+b,0);
    const rem = BUDGET - total;
    const name = modal.querySelector('#m-name')?.value || '';
    const company = modal.querySelector('#m-company')?.value || '';
    const ok = rem === 0 && name.trim();
    modal.querySelector('#m-rem').textContent = 'Remaining: ' + fmt(rem);
    modal.querySelector('#m-rem').style.color = rem === 0 ? 'var(--accent)' : 'var(--gold)';
    modal.querySelector('#m-save').disabled = !ok;
    modal.querySelector('#m-save').style.background = ok ? 'var(--accent)' : 'rgba(255,255,255,0.04)';
    modal.querySelector('#m-save').style.color = ok ? 'var(--bg)' : 'var(--dim)';
    CATEGORIES.forEach(c => { modal.querySelector(`#m-val-${c.id}`).textContent = (allocs[c.id]/1000)+'k'; });
  };
  modal.innerHTML = `<div class="modal"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><h3 style="font-size:16px;font-weight:700">Manual Entry</h3><button onclick="document.getElementById('manual-modal').remove()" style="background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer">✕</button></div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px"><input type="text" id="m-name" class="field" placeholder="Name" maxlength="20" oninput="this.closest('.modal-bg')._render()"><input type="text" id="m-company" class="field sm" placeholder="Company (optional)" maxlength="40"></div>
    <div id="m-rem" style="font-size:13px;text-align:center;margin-bottom:12px;font-weight:600;color:var(--gold)">Remaining: ${fmt(BUDGET)}</div>
    ${CATEGORIES.map(c=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:16px;width:22px;text-align:center">${c.icon}</span><span style="flex:1;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</span><button class="cat-btn" style="width:28px;height:28px;font-size:14px" onclick="this.closest('.modal-bg')._dec('${c.id}')">−</button><span id="m-val-${c.id}" style="width:44px;text-align:center;font-size:13px;font-weight:700;color:${c.color};font-variant-numeric:tabular-nums">0k</span><button class="cat-btn plus" style="width:28px;height:28px;font-size:14px;border-color:${c.color}30;background:${c.color}10;color:${c.color}" onclick="this.closest('.modal-bg')._inc('${c.id}')">+</button></div>`).join('')}
    <button id="m-save" class="btn primary" disabled style="width:100%;margin-top:14px;padding:12px" onclick="this.closest('.modal-bg')._save()">Save</button></div>`;
  modal._allocs = allocs;
  modal._render = render;
  modal._inc = id => { const n={...allocs,[id]:allocs[id]+STEP}; if(Object.values(n).reduce((a,b)=>a+b,0)<=BUDGET){allocs[id]+=STEP;render();}};
  modal._dec = id => { if(allocs[id]>0){allocs[id]-=STEP;render();}};
  modal._save = () => {
    const name = modal.querySelector('#m-name').value.trim();
    const company = modal.querySelector('#m-company').value.trim();
    const pid = 'm_' + name.toLowerCase().replace(/[^a-z0-9]/g,'') + '_' + Date.now().toString(36);
    publish('votes/' + pid, { name, company, allocations: allocs, ts: Date.now() }, true);
    participants[pid] = { name, company, allocations: allocs, ts: Date.now() };
    modal.remove();
    renderPresenter();
  };
  document.body.appendChild(modal);
}

function exportResults() {
  const parts = Object.values(participants);
  const pL = p => p.company ? `${p.name} (${p.company})` : p.name;
  const agg = CATEGORIES.map(c => ({...c, total: parts.reduce((s,p) => s + (p.allocations?.[c.id]||0), 0), avg: parts.length > 0 ? Math.round(parts.reduce((s,p) => s + (p.allocations?.[c.id]||0), 0) / parts.length) : 0}));
  const sorted = [...agg].sort((a,b) => b.avg - a.avg);
  let txt = `Fund the Future: AI x Sustainability\n100k Budget Game Results\n\nParticipants: ${parts.length}\n\nRanking\n`;
  sorted.forEach((c,i) => txt += `${i+1}. ${c.icon} ${c.name}: ${fmt(c.total)} total (avg ${fmt(c.avg)})\n`);
  txt += '\nIndividual Allocations\n';
  parts.forEach(p => { txt += `\n${pL(p)}:\n`; CATEGORIES.forEach(c => { const v = p.allocations?.[c.id]||0; if(v>0) txt += `  ${c.icon} ${c.name}: ${fmt(v)}\n`; }); });
  const modal = document.createElement('div');
  modal.className = 'modal-bg';
  modal.style.alignItems = 'center';
  modal.innerHTML = `<div class="modal" style="max-width:540px;max-height:80vh;display:flex;flex-direction:column"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h3 style="font-size:16px;font-weight:700">Export</h3><button onclick="this.closest('.modal-bg').remove()" style="background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer">✕</button></div>
    <pre style="flex:1;overflow:auto;background:var(--bg);border-radius:10px;padding:14px;font-size:11px;color:var(--muted);white-space:pre-wrap;font-family:'JetBrains Mono','Fira Code',monospace;border:1px solid var(--border);line-height:1.6">${txt}</pre>
    <div style="display:flex;gap:8px;margin-top:14px"><button class="btn accent" style="flex:1" onclick="navigator.clipboard.writeText(this.closest('.modal-bg').querySelector('pre').textContent);this.textContent='✓ Copied';setTimeout(()=>this.textContent='Copy to clipboard',2000)">Copy to clipboard</button><button class="btn" style="flex:1" onclick="this.closest('.modal-bg').remove()">Close</button></div></div>`;
  document.body.appendChild(modal);
}

// ╔═══════════════════════════════════════════════════════════════╗
// ║  CONFETTI                                                     ║
// ╚═══════════════════════════════════════════════════════════════╝
function fireConfetti() {
  const box = document.getElementById('confetti-box');
  box.style.display = 'block'; box.innerHTML = '';
  const colors = CATEGORIES.map(c => c.color);
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `left:${Math.random()*100}%;width:${5+Math.random()*6}px;height:${3+Math.random()*4}px;background:${colors[i%6]};--dur:${1.8+Math.random()*2}s;--delay:${Math.random()*0.6}s;--drift:${(Math.random()-0.5)*130}px;transform:rotate(${Math.random()*360}deg)`;
    box.appendChild(p);
  }
  setTimeout(() => { box.style.display = 'none'; box.innerHTML = ''; }, 4000);
}
</script>
